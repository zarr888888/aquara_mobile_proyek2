name: AQUARA CI/CD Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build & Release AQUARA APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.2'
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🔐 Menyiapkan google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: 🔑 Menyiapkan Keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > android/app/aquara-release.jks

      - name: 📝 Membuat key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=aquara-release.jks
          EOF

      - name: 🏗️ Build APK Release
        run: flutter build apk --release --split-per-abi

      - name: 📤 Kirim APK ke Telegram
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            FILENAME=$(basename "$apk")
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F "document=@${apk}" \
              -F "caption=📦 *AQUARA Mobile Build Sukses!* 🚀

          📝 *Pesan Commit:* $COMMIT_MSG
          📂 *File:* \`$FILENAME\`" \
              -F "parse_mode=Markdown"
            echo "Berhasil mengirim: $FILENAME"
            sleep 2
          done